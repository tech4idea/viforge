services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-viforge}
      POSTGRES_USER: ${POSTGRES_USER:-viforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-viforge}
    ports:
      - "${VIFORGE_POSTGRES_PORT:-25432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viforge}"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    ports:
      - "${VIFORGE_QDRANT_PORT:-16333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  api:
    build:
      context: .
      target: api-runtime
    image: viforge-api:latest
    restart: unless-stopped
    ports:
      - "${VIFORGE_API_PORT:-13001}:3001"
    environment:
      PORT: 3001
      VIFORGE_PRODUCT: ${VIFORGE_PRODUCT:-novel-adaptation}
      WORKSPACES_ROOT: /data/workspaces
      LOGS_ROOT: /data/logs
      DATABASE_URL: postgresql://${POSTGRES_USER:-viforge}:${POSTGRES_PASSWORD:-viforge}@postgres:5432/${POSTGRES_DB:-viforge}
      QDRANT_URL: http://qdrant:6333
      VIFORGE_AIGC_HUB_BASE_URL: ${VIFORGE_AIGC_HUB_BASE_URL:-}
      VIFORGE_AIGC_HUB_API_KEY: ${VIFORGE_AIGC_HUB_API_KEY:-}
      VIFORGE_AIGC_HUB_APP_ID: ${VIFORGE_AIGC_HUB_APP_ID:-}
      VIFORGE_AIGC_HUB_IMAGE_MODEL: ${VIFORGE_AIGC_HUB_IMAGE_MODEL:-}
      VIFORGE_AIGC_HUB_CHAT_MODEL: ${VIFORGE_AIGC_HUB_CHAT_MODEL:-}
      VIFORGE_WECHAT_CHAT_MODEL: ${VIFORGE_WECHAT_CHAT_MODEL:-minimax/minimax-m2.7}
      VIFORGE_AIGC_HUB_EMBEDDING_MODEL: ${VIFORGE_AIGC_HUB_EMBEDDING_MODEL:-}
      VIFORGE_LANGGRAPH_STORE_EMBEDDING_DIMS: ${VIFORGE_LANGGRAPH_STORE_EMBEDDING_DIMS:-1024}
      VIFORGE_PLAYWRITER_BIN: ${VIFORGE_PLAYWRITER_BIN:-/app/apps/api/node_modules/.bin/playwriter}
      VIFORGE_PLAYWRITER_HOST: ${VIFORGE_PLAYWRITER_HOST:-http://host.docker.internal:19988}
      VIFORGE_PLAYWRITER_TOKEN: ${VIFORGE_PLAYWRITER_TOKEN:-}
      VIFORGE_PLAYWRITER_SESSION_ID: ${VIFORGE_PLAYWRITER_SESSION_ID:-}
      VIFORGE_PLAYWRITER_HOST_HEADER: ${VIFORGE_PLAYWRITER_HOST_HEADER:-}
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-http://192.168.43.167:6006}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-viforge}
      PHOENIX_SERVICE_NAME: ${PHOENIX_SERVICE_NAME:-viforge-api}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${VIFORGE_API_DATA_DIR:-./var/api-data}:/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  web:
    build:
      context: .
      target: web-runtime
      args:
        VIFORGE_PRODUCT: ${VIFORGE_PRODUCT:-novel-adaptation}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    image: viforge-web:latest
    restart: unless-stopped
    ports:
      - "${VIFORGE_WEB_PORT:-18080}:80"
    depends_on:
      - api

volumes:
  postgres-data:
  qdrant-data:
